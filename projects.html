<script>
    const supabaseClient = window.supabase.createClient(
        "https://ernuqgqeeghqplrrpiah.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVybnVxZ3FlZWdocXBscnJwaWFoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MDEyNDIsImV4cCI6MjA5MjA3NzI0Mn0.Ilo8nbkT0KqGZPOBoh0RfV65WsF2dwFgDEFZsLcdvfE"
    );


    async function loadProjects() {
        const { data, error } = await supabaseClient.from("projects").select("*");
        if (error) {
            console.error("Error fetching projects:", error);
            return;
        }

        const projectsSection = document.querySelector(".Context");
        data.forEach(project => {

            const title = DOMPurify.sanitize(project.title);
            const description = DOMPurify.sanitize(project.description);
            const tech_stack = DOMPurify.sanitize(project.tech_stack);
            const github_link = DOMPurify.sanitize(project.github_link);

            const projectElement = document.createElement("div");
            projectElement.classList.add("project");
            projectElement.innerHTML = `
                <h3>${project.title}</h3>
                <p>${project.description}</p>
                <p>Tech Stack: ${project.tech_stack}</p>
                <a href="${project.github_link}">View Project</a>
            `;
            projectsSection.appendChild(projectElement);
        });
        
    }
    loadProjects();
</script>
